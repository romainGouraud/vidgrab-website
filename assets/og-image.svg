<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#7c3aed" fill-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="600" cy="350" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Logo + brand -->
  <g transform="translate(80, 100)">
    <rect width="80" height="80" rx="20" fill="url(#iconbg)"/>
    <path d="M30 25 L55 40 L30 55 Z" fill="white"/>
    <rect x="10" y="15" width="60" height="50" rx="8" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>

    <text x="105" y="55" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="900" fill="white">VidGrab</text>
  </g>

  <!-- Headline -->
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="900" fill="white" letter-spacing="-2">
    Save any video.
  </text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="900" fill="url(#accent)" letter-spacing="-2">
    Once. For life.
  </text>

  <!-- Subtitle -->
  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#9ca3af">
    Vimeo · Bunny.net · HLS · MP4 · One-click download
  </text>

  <!-- Pricing pill -->
  <g transform="translate(80, 500)">
    <rect width="380" height="68" rx="34" fill="url(#iconbg)" opacity="0.15"/>
    <rect width="380" height="68" rx="34" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="32" y="44" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="white">
      $9.99 lifetime
    </text>
    <text x="200" y="44" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#9ca3af">
      · No subscription
    </text>
  </g>

  <!-- Footer URL -->
  <text x="1120" y="595" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#6b7280">
    vidgrab.app
  </text>
</svg>
